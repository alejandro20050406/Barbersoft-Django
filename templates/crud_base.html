{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}BarberSoft{% endblock title %}</title>
    <link rel="stylesheet" href="{% static 'css/ui.css' %}">
    <link rel="stylesheet" href="{% static 'css/crud.css' %}">
</head>
<body>
    <header class="topbar">
        <div class="brand">
            <span class="brand-mark">B</span>
            <div>
                <p class="brand-title">BarberSoft</p>
                <p class="brand-subtitle">Panel de trabajo</p>
            </div>
        </div>
        <nav class="main-nav">
            <a href="{% url 'accounts:home' %}">Inicio</a>
            <a href="{% url 'catalogos:dashboard' %}">Catálogos</a>
            <a href="{% url 'clientes:cliente-list' %}">Clientes</a>
            <a href="{% url 'empleados:empleado-list' %}">Empleados</a>
            <a href="{% url 'ventas:venta-list' %}">Ventas</a>
            <a href="{% url 'reportes:dashboard' %}">Reportes</a>
            <a href="/admin/" target="_blank">Admin Django</a>
        </nav>
    </header>

    <main class="page-shell">
        {% if messages %}
            <div class="alerts">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        {{ message }}
                        <button type="button" class="close" aria-label="Close">×</button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock content %}
    </main>

    <script>
        document.querySelectorAll('.alert .close').forEach(btn => {
            btn.addEventListener('click', function() {
                this.parentElement.style.display = 'none';
            });
        });
    </script>
</body>
</html>
