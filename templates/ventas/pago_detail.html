{% extends "crud_base.html" %}

{% block title %}Pago #{{ pago.id }} - BarberSoft{% endblock %}

{% block content %}
<div class="page-header">
    <div><h1 class="page-title">Pago #{{ pago.id }}</h1></div>
    <div class="action-buttons">
        <a href="{% url 'ventas:pago-list' %}" class="btn btn-secondary">← Volver</a>
        <a href="{% url 'ventas:pago-update' pago.pk %}" class="btn btn-secondary">Editar</a>
    </div>
</div>

<div class="detail-section">
    <div class="detail-grid">
        <div class="detail-item"><span class="detail-label">Venta</span><span class="detail-value">#{{ pago.venta.id }}</span></div>
        <div class="detail-item"><span class="detail-label">Método de Pago</span><span class="detail-value">{{ pago.metodo_de_pago.nombre }}</span></div>
        <div class="detail-item"><span class="detail-label">Monto</span><span class="detail-value">${{ pago.monto }}</span></div>
        <div class="detail-item"><span class="detail-label">Fecha</span><span class="detail-value">{{ pago.fecha|date:"d/m/Y" }}</span></div>
    </div>
</div>
{% endblock %}
